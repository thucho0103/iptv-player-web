<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Primary Gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Deep Gloss Screen Gradient -->
    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161a23" />
      <stop offset="100%" stop-color="#08090d" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Antennas -->
  <path d="M190 120 L230 60" stroke="url(#primary-grad)" stroke-width="16" stroke-linecap="round" />
  <path d="M322 120 L282 60" stroke="url(#primary-grad)" stroke-width="16" stroke-linecap="round" />
  <circle cx="230" cy="60" r="14" fill="#ec4899" />
  <circle cx="282" cy="60" r="14" fill="#8b5cf6" />

  <!-- TV Outer Frame -->
  <rect x="56" y="110" width="400" height="300" rx="44" fill="url(#primary-grad)" />

  <!-- TV Screen -->
  <rect x="76" y="130" width="360" height="230" rx="24" fill="url(#screen-grad)" />

  <!-- Base / Stand -->
  <path d="M216 410 L296 410 L316 452 L196 452 Z" fill="url(#primary-grad)" />
  <rect x="156" y="444" width="200" height="16" rx="8" fill="url(#primary-grad)" />

  <!-- Play Symbol -->
  <path d="M226 195 L316 245 L226 295 Z" fill="url(#primary-grad)" filter="url(#glow)" />
</svg>